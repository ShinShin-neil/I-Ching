<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經六十四卦查詢</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>易經六十四卦查詢</h1>
        <div class="search-section">
            <input type="text" id="searchBox" placeholder="搜尋卦名或編號...">
            <button id="searchBtn">查詢</button>
        </div>
    </header>
    
    <main>
        <section class="hexagram-grid" id="hexagramGrid">
            <!-- 64個卦象按鈕將在此生成 -->
        </section>
        
        <section id="results">
            <h2>查詢結果</h2>
            <div id="hexagramInfo">
                <!-- 卦象詳細信息將在此顯示 -->
            </div>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 I-Ching Hexagrams Lookup. All rights reserved.</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
